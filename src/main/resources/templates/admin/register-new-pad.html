<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Register New Pad</title>
    <div th:replace="~{header::head}"></div>
  </head>
  <body>
    <div th:replace="~{header::header}"></div>

    <!--begin::App Main-->
    <main class="app-main">
      <div class="container mt-5">
        <div class="row justify-content-center">
          <div class="col-md-8">
            <div class="card shadow mb-4">
              <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h3 class="card-title mb-0">
                  <i class="fa-solid fa-tablet-screen-button me-2"></i>
                  Register New Pad
                </h3>
              </div>
              <div class="card-body p-4">
                <form th:action="@{/admin/connect-new-pad}" method="post" class="row g-3">
                  <div class="col-12">
                    <label for="padName" class="form-label fw-bold">Pad Name</label>
                    <input type="text"
                           class="form-control"
                           id="padName"
                           name="name"
                           placeholder="Enter pad name"
                           required/>
                    <div class="form-text">Geben Sie einen eindeutigen Namen für das neue Tablet ein.</div>
                  </div>

                  <div class="col-12 d-flex justify-content-between mt-4">
                    <a th:href="@{/admin}" class="btn btn-outline-secondary">
                      <i class="fa-solid fa-circle-xmark me-2"></i>Cancel
                    </a>
                    <button type="submit" class="btn btn-primary">
                      <i class="fa-solid fa-plug me-2"></i>Connect
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div th:replace="~{footer::footer}"></div>

  </body>
</html>
