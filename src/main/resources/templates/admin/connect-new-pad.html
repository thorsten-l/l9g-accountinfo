<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Connect New Pad</title>
    <div th:replace="~{header::head}"></div>
  </head>
  <body>
    <div th:replace="~{header::header}"></div>

    <!--begin::App Main-->
    <main class="app-main">
      <div class="container mt-5">
        <div class="row justify-content-center">
          <div class="col-md-8 text-center">
            <div class="card shadow mb-4">
              <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h3 class="card-title mb-0">
                  <i class="fa-solid fa-qrcode me-2"></i>
                  Connect New Pad
                </h3>
              </div>
              <div class="card-body p-4 text-center">
                <div class="mb-4">
                  <img th:src="@{/api/v1/signature-pad/connect-qrcode(uuid=${pad.uuid})}"
                       th:alt="'QR Code for Pad ' + ${pad.uuid}"
                       class="img-fluid border rounded shadow-sm"
                       style="max-width: 300px;"/>
                </div>

                <div class="mb-4 bg-light p-3 rounded border">
                  <div class="mb-2"><strong>Pad Name:</strong> <em th:text="${pad.name}">pad-name</em></div>
                  <div class="small text-muted"><strong>UUID:</strong> <em th:text="${pad.uuid}">pad-uuid</em></div>
                </div>

                <div class="d-flex justify-content-between mt-4">
                   <a th:href="@{/admin/validate-new-pad(uuid=${pad.uuid})}"
                      class="btn btn-outline-secondary">
                     <i class="fa-solid fa-desktop me-2"></i>Use this browser
                   </a>
                   <a th:href="@{/admin}"
                      class="btn btn-primary">
                     <i class="fa-solid fa-circle-xmark me-2"></i>Abbruch
                   </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div th:replace="~{footer::footer}"></div>

  </body>
</html>
