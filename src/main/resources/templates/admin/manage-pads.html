<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Tablet-Bearbeitung</title>
    <div th:replace="~{header::head}"></div>
  </head>
  <body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
    <div class="app-wrapper">
      <div th:replace="~{header::header}"></div>
      <!--begin::App Main-->
      <main class="app-main">
        <div class="container mt-5">
          <div class="row justify-content-center">
            <div class="col-md-10">
              <div class="card shadow">
                <div class="card-header bg-danger text-white d-flex justify-content-between align-items-center">
                  <h3 class="card-title mb-0">
                    <i class="fa-solid fa-tablets me-2"></i>
                    Tablet-Bearbeitung
                  </h3>
                  <div class="d-flex align-items-center">
                    <div class="form-check form-switch me-3">
                      <input class="form-check-input" type="checkbox" id="showHiddenToggle" th:checked="${showHidden}" onchange="toggleHidden(this.checked)"/>
                      <label class="form-check-label text-white" for="showHiddenToggle">Versteckte Tablets anzeigen</label>
                    </div>
                    <div th:if="${isUnsealed}" id="unlockTimer" class="badge bg-light text-danger p-2 fs-6 shadow-sm">
                      <i class="fa-solid fa-clock me-1"></i> <span id="timeLeft">--</span>s
                    </div>
                  </div>
                </div>
                <div class="card-body p-0">
                  <div class="table-responsive">
                    <table class="table table-hover mb-0">
                      <thead class="table-light">
                        <tr>
                          <th class="ps-4">Name</th>
                          <th>UUID / Pad ID</th>
                          <th>Beschreibung</th>
                          <th>Erstellt von</th>
                          <th>Erstellt am</th>
                          <th class="text-center pe-4">Aktion</th>
                        </tr>
                      </thead>
                      <tbody>
                        <tr th:each="pad : ${pads}">
                          <td class="ps-4 fw-bold" th:text="${pad.name}">Pad Name</td>
                          <td>
                            <code th:text="${pad.padid}">pad-uuid</code>
                          </td>
                          <td th:text="${pad.description}">Description</td>
                          <td th:text='${pad.createdBy.name + ", " + pad.createdBy.mail }'>Created By</td>
                          <td th:text="${#dates.format(pad.createTimestamp, 'dd.MM.yyyy HH:mm')}">01.01.2025 12:00</td>
                          <td class="pe-4">
                            <div class="d-flex justify-content-center gap-1">
                              <!-- edit and hide actions can be added here -->
                              <a class="btn btn-outline-info btn-sm border-0" 
                                 th:href="@{/admin/show-pad-info(padid=${pad.padid})}" title="Details">
                                <i class="fa-solid fa-circle-info"></i>
                              </a>
                              <button th:if="${!pad.immutable && !pad.hidden}" class="btn btn-outline-warning btn-sm border-0" 
                                      th:onclick="hidePad([[${pad.dbid}]], [[${pad.name}]])" title="Verstecken">
                                <i class="fa-solid fa-eye-slash"></i>
                              </button>
                              <button th:if="${!pad.immutable && pad.hidden}" class="btn btn-outline-success btn-sm border-0" 
                                      th:onclick="showPad([[${pad.dbid}]], [[${pad.name}]])" title="Anzeigen">
                                <i class="fa-solid fa-eye"></i>
                              </button>
                              <button th:if="${!pad.validated}" class="btn btn-outline-danger btn-sm border-0" 
                                      th:onclick="deletePad([[${pad.dbid}]], [[${pad.name}]])" title="Löschen">
                                <i class="fa-solid fa-trash-can"></i>
                              </button>
                              <span th:if="${pad.immutable}" class="badge bg-secondary">Immutable</span>
                            </div>
                          </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(pads)}">
                          <td colspan="5" class="text-center py-4 text-muted">
                            <i class="fa-solid fa-inbox me-2"></i>
                            Keine Tablets registriert.
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
                <div class="card-footer bg-light text-end py-3">
                  <a th:href="@{/admin}" class="btn btn-outline-secondary">
                    <i class="fa-solid fa-arrow-left me-2"></i> Zurück
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div th:replace="~{footer::footer}"></div>

    <script>
      function toggleHidden(showHidden)
      {
        window.location.href = `/admin/manage-pads?showHidden=${showHidden}`;
      }

      async function hidePad(dbid, name)
      {
        if (confirm(`Möchten Sie das Tablet "${name}" wirklich verstecken?`))
        {
          window.location.href = `/admin/hide-pad?id=${encodeURIComponent(dbid)}`;
        }
      }

      async function showPad(dbid, name)
      {
        if (confirm(`Möchten Sie das Tablet "${name}" wieder anzeigen?`))
        {
          window.location.href = `/admin/show-pad?id=${encodeURIComponent(dbid)}`;
        }
      }

      async function deletePad(dbid, name)
      {
        if (confirm(`Möchten Sie das Tablet "${name}" wirklich unwiderruflich löschen?`))
        {
          const showHidden = document.getElementById('showHiddenToggle').checked;
          window.location.href = `/admin/delete-pad?id=${encodeURIComponent(dbid)}&showHidden=${showHidden}`;
        }
      }
    </script>
  </body>
</html>
