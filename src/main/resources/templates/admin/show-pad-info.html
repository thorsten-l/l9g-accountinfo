<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Signature Pad Info</title>
    <div th:replace="~{header::head}"></div>
    <style>
      .info-table th {
        width: 25%;
        background-color: #f8f9fa;
      }
      .section-header {
        background-color: #e9ecef;
        padding: 0.5rem 1rem;
        margin-top: 1.5rem;
        border-radius: 0.25rem;
        font-weight: bold;
      }
    </style>
  </head>
  <body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
    <div class="app-wrapper">
      <div th:replace="~{header::header}"></div>
      <!--begin::App Main-->
      <main class="app-main">
        <div class="container mt-5">
          <div class="row justify-content-center">
            <div class="col-md-10">
              <div class="card shadow">
                <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">
                  <h3 class="card-title mb-0">
                    <i class="fa-solid fa-circle-info me-2"></i>
                    Signature Pad Details
                  </h3>

                  <div th:if="${isUnsealed}" id="unlockTimer" class="badge bg-light text-danger p-2 fs-6 shadow-sm">
                    <i class="fa-solid fa-clock me-1"></i> <span id="timeLeft">--</span>s
                  </div>
                </div>
                <div class="card-body">
                  
                  <div class="section-header">Allgemeine Informationen</div>
                  <div class="table-responsive">
                    <table class="table table-bordered info-table mt-2">
                      <tbody>
                        <tr>
                          <th>UUID</th>
                          <td><code th:text="${pad.uuid}">uuid</code></td>
                        </tr>
                        <tr>
                          <th>Name</th>
                          <td th:text="${pad.name}">name</td>
                        </tr>
                        <tr>
                          <th>Validiert</th>
                          <td>
                            <span th:if="${pad.validated}" class="badge bg-success">Ja</span>
                            <span th:if="${!pad.validated}" class="badge bg-danger">Nein</span>
                          </td>
                        </tr>
                        <tr>
                          <th>Version</th>
                          <td th:text="${pad.version}">version</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>

                  <div class="section-header">Client Environment</div>
                  <div class="table-responsive">
                    <table class="table table-sm table-bordered table-striped info-table mt-2">
                      <thead>
                        <tr class="table-light">
                          <th style="width: 25%">Eigenschaft</th>
                          <th style="width: 75%">Wert</th>
                        </tr>
                      </thead>
                      <tbody>
                        <th:block th:insert="~{::renderMap(map=${pad.clientEnvironment}, prefix='')}" />
                      </tbody>
                    </table>
                  </div>
                </div>
                <div class="card-footer bg-light text-end py-3">
                  <a th:href="@{/admin/manage-pads}" class="btn btn-outline-secondary">
                    <i class="fa-solid fa-arrow-left me-2"></i> Zurück
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    
    <div th:replace="~{footer::footer}"></div>

    <!-- Recursive Fragment for Map Rendering -->
    <th:block th:fragment="renderMap(map, prefix)">
      <th:block th:each="entry : ${map}">
        <tr th:if="${!(entry.value instanceof T(java.util.Map))}">
          <td th:text="${prefix + entry.key}"></td>
          <td style="word-break: break-all;" 
              th:text="${entry.value instanceof T(java.util.Collection) ? #strings.listJoin(entry.value, ', ') : entry.value}"></td>
        </tr>
        <th:block th:if="${entry.value instanceof T(java.util.Map)}">
          <th:block th:insert="~{::renderMap(map=${entry.value}, prefix=${prefix + entry.key + '.'})}" />
        </th:block>
      </th:block>
    </th:block>

  </body>
</html>
