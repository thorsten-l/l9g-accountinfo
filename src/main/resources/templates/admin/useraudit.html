<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>AccountInfo - Personen Audit</title>
    <div th:replace="~{header::head}"></div>
    <style>
      .photo-viewfinder {
        position: relative;
        width: 100%;
        max-width: 480px;
        margin: 1rem auto;
        aspect-ratio: 1.585 / 1;
        border: 2px dashed #6c757d;
        border-radius: 6px;
        overflow: hidden;
      }
      .photo-viewfinder img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      #photo-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.8);
        z-index: 9999;
        justify-content: center;
        align-items: center;
      }
      .overlay-content {
        background: white;
        padding: 20px;
        border-radius: 8px;
        position: relative;
        width: 90%;
        max-width: 600px;
      }
    </style>
  </head>
  <body class="layout-fixed sidebar-expand-lg bg-body-tertiary">
    <div id="photo-overlay">
      <div class="overlay-content shadow-lg" style="max-height: 90vh; overflow-y: auto;">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h4 id="overlay-title" class="mb-0">Details</h4>
          <button type="button" class="btn-close" onclick="document.getElementById('photo-overlay').style.display='none'"></button>
        </div>
        
        <div id="overlay-info-container" class="mb-3" style="display:none;">
          <div class="card bg-light">
            <div class="card-body p-3">
              <div id="info-content"></div>
            </div>
          </div>
        </div>

        <div id="overlay-sig-container" class="mb-3" style="display:none;">
          <div class="card bg-light">
            <div class="card-body p-1 text-center">
              <img id="overlay-sig-img" src="" alt="Unterschrift" style="max-width: 100%; max-height: 250px; object-fit: contain;">
            </div>
          </div>
        </div>

        <div id="overlay-photo-container" class="photo-viewfinder" style="display:none;">
          <img id="overlay-img" src="" alt="Vorschau">
        </div>

        <div class="mt-3 text-end">
          <button type="button" class="btn btn-secondary" onclick="document.getElementById('photo-overlay').style.display='none'">Schließen</button>
        </div>
      </div>
    </div>
    <div class="app-wrapper">
      <div th:replace="~{header::header}"></div>
      <!--begin::App Main-->
      <main class="app-main">
        <div class="container mt-5">
          <div class="row justify-content-center">
            <div class="col-md-8">

              <!-- Search Card -->
              <div class="card shadow mb-4">
                <div class="card-header bg-danger text-white d-flex justify-content-between align-items-center">
                  <h3 class="card-title mb-0">
                    <i class="fa-solid fa-users-viewfinder me-2"></i>
                    Personensuche
                  </h3>
                  <div th:if="${isUnsealed}" id="unlockTimer" class="badge bg-light text-danger p-2 fs-6 shadow-sm">
                    <i class="fa-solid fa-clock me-1"></i> <span id="timeLeft">--</span>s
                  </div>
                </div>
                <div class="card-body">
                  <div class="input-group input-group-lg">
                    <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
                    <input type="text" class="form-control" id="common-name-input" placeholder="Vorname Nachname" autocomplete="off">
                  </div>
                  <select id="common-name-results" class="form-control form-control-lg mt-2 d-none" size="10"></select>
                </div>
                <div class="card-footer d-flex justify-content-end bg-light">
                  <button type="button" class="btn btn-outline-secondary btn-lg me-2" id="btn-clear-common-name">
                    <i class="fa-solid fa-eraser me-1"></i> Löschen
                  </button>
                  <button type="button" class="btn btn-danger btn-lg" id="btn-send-common-name">
                    <i class="fa-solid fa-search me-1"></i> Suchen
                  </button>
                </div>
              </div>

              <!-- Results Card -->
              <div class="card shadow">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                  <h3 class="card-title mb-0">
                    <i class="fa-solid fa-list-check me-2"></i>
                    Audit Ergebnisse
                  </h3>
                </div>
                <div class="card-body p-0">
                  <div class="table-responsive">
                    <table class="table table-hover mb-0" id="audit-table">
                      <thead class="table-light">
                        <tr>
                          <th class="ps-4">Datum</th>
                          <th>Typ</th>
                          <th class="text-center pe-4">Aktion</th>
                        </tr>
                      </thead>
                      <tbody id="audit-results-body">
                        <tr>
                          <td colspan="3" class="text-center py-4 text-muted">
                            <i class="fa-solid fa-search me-2"></i>
                            Bitte suchen Sie nach einer Person.
                          </td>
                        </tr>
                      </tbody>
                    </table>
                  </div>
                </div>
                <div class="card-footer bg-light text-end py-3">
                  <a th:href="@{/admin}" class="btn btn-outline-secondary">
                    <i class="fa-solid fa-arrow-left me-2"></i> Zurück
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div th:replace="~{footer::footer}"></div>

    <script>
      const commonNameInput = document.getElementById('common-name-input');
      const commonNameResults = document.getElementById('common-name-results');
      const btnClearCommonName = document.getElementById('btn-clear-common-name');
      const btnSendCommonName = document.getElementById('btn-send-common-name');
      const auditResultsBody = document.getElementById('audit-results-body');

      let debounceTimer = null;
      let currentAbortController = null;
      let selectedPersonUid = null;

      function fetchPersons(query, signal)
      {
        return fetch(`/api/v1/admin/secret/search/person?query=${encodeURIComponent(query)}`, {
          method: 'GET',
          headers: {'Accept': 'application/json'},
          signal: signal
        }).then(response => {
          if (!response.ok)
          {
            if (response.status === 404)
             
              return [];
            throw new Error(`Server-Fehler: ${response.status}`);
          }
          return response.json();
        });
      }

      function fetchAuditData(uid)
      {
        return fetch(`/api/v1/admin/secret/audit/person/${encodeURIComponent(uid)}`, {
          method: 'GET',
          headers: {'Accept': 'application/json'}
        }).then(response => {
          if (!response.ok)
          {
            if (response.status === 404)
             
              return [];
            throw new Error(`Server-Fehler: ${response.status}`);
          }
          return response.json();
        });
      }

      function formatDate(timestamp)
      {
        if (!timestamp)
         
          return '-';
        const date = new Date(timestamp);
        const pad = (n) => n.toString().padStart(2, '0');
        return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ` +
                `${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
      }

      function updateAuditTable(entries)
      {
        auditResultsBody.innerHTML = '';
        if (!entries || entries.length === 0)
        {
          auditResultsBody.innerHTML = `
            <tr>
              <td colspan="3" class="text-center py-4 text-muted">
                <i class="fa-solid fa-triangle-exclamation me-2"></i> Keine Einträge gefunden.
              </td>
            </tr>`;
          return;
        }

        entries.forEach(entry => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td class="ps-4">${formatDate(entry.modifyTimestamp)}</td>
            <td><code>${entry.type}</code></td>
            <td class="text-center pe-4">
              <button class="btn btn-outline-danger btn-sm border-0" onclick="showDetails('${entry.id}', '${entry.type}')">
                <i class="fa-solid fa-circle-info"></i>
              </button>
            </td>
          `;
          auditResultsBody.appendChild(row);
        });
      }

      function formatUserObj(obj) {
        if (!obj) return '-';
        if (typeof obj === 'string') {
           try {
             obj = JSON.parse(obj);
           } catch(e) { return obj; }
        }
        return `<strong>${obj.name || ''}</strong> (${obj.username || ''}) &lt;${obj.mail || ''}&gt;`;
      }

      function showDetails(id, type) {
        const infoContainer = document.getElementById('overlay-info-container');
        const photoContainer = document.getElementById('overlay-photo-container');
        const sigContainer = document.getElementById('overlay-sig-container');
        const infoContent = document.getElementById('info-content');
        const img = document.getElementById('overlay-img');
        const sigImg = document.getElementById('overlay-sig-img');
        const title = document.getElementById('overlay-title');

        // Reset
        infoContainer.style.display = 'none';
        photoContainer.style.display = 'none';
        sigContainer.style.display = 'none';
        infoContent.innerHTML = '';
        img.src = '';
        sigImg.src = '';

        if (type === 'ID_FRONT_IMAGE' || type === 'ID_BACK_IMAGE') {
          title.textContent = (type === 'ID_FRONT_IMAGE' ? 'Ausweis Vorderseite' : 'Ausweis Rückseite');
          img.src = `/api/v1/admin/secret/id.jpeg?id=${encodeURIComponent(id)}`;
          photoContainer.style.display = 'flex';
          document.getElementById('photo-overlay').style.display = 'flex';
        } 
        else if (type === 'ID_SIGNATURE_JWT') {
          title.textContent = 'Signatur Audit';
          
          fetch(`/api/v1/admin/secret/userinfo.json?id=${encodeURIComponent(id)}`)
            .then(r => r.json())
            .then(data => {
              let html = '<div class="mb-3"><strong>Herausgeber (Publisher):</strong><br>' + formatUserObj(data.publisher) + '</div>';
              
              if (data.customer) {
                html += '<div class="mb-3"><strong>Kunde (Customer):</strong><br>';
                let customerDetails = formatUserObj(data.customer);
                if (data.name) {
                  html += `${data.name} (${customerDetails})`;
                } else {
                  html += customerDetails;
                }
                html += '</div>';
              } else if (data.name) {
                html += '<div class="mb-3"><strong>Kunde (Customer):</strong><br>' + data.name + '</div>';
              }

              html += '<hr><div class="row small">';
              for (const [key, value] of Object.entries(data)) {
                if (key !== 'publisher' && key !== 'customer' && key !== 'name' && typeof value !== 'object') {
                  html += `<div class="col-4 text-muted">${key}:</div><div class="col-8">${value}</div>`;
                }
              }
              html += '</div>';
              
              infoContent.innerHTML = html;
              infoContainer.style.display = 'block';
              
              // Add signature image
              sigImg.src = `/api/v1/admin/secret/signature.png?id=${encodeURIComponent(id)}`;
              sigContainer.style.display = 'block';
              
              document.getElementById('photo-overlay').style.display = 'flex';
            })
            .catch(err => alert('Fehler beim Laden der Details: ' + err.message));
        }
        else {
          alert('Details für Typ ' + type + ' (ID: ' + id + ') folgen...');
        }
      }

      commonNameInput.addEventListener('keyup', () => {
        const input = commonNameInput.value.trim();
        clearTimeout(debounceTimer);

        if (input.length < 5)
        {
          if (currentAbortController)
           
            currentAbortController.abort();
          commonNameResults.classList.add('d-none');
          commonNameResults.innerHTML = '';
          return;
        }

        debounceTimer = setTimeout(() => {
          if (currentAbortController)
           
            currentAbortController.abort();
          currentAbortController = new AbortController();

          fetchPersons(input, currentAbortController.signal)
                  .then(persons => {
                    commonNameResults.innerHTML = '';
                    if (persons && persons.length > 0)
                    {
                      persons.forEach(person => {
                        const option = document.createElement('option');
                        option.value = person.uid;
                        option.textContent = `${person.firstname}, ${person.lastname} (${person.birthday || ''})`;
                        commonNameResults.appendChild(option);
                      });
                      commonNameResults.classList.remove('d-none');
                    }
                    else
                    {
                      commonNameResults.classList.add('d-none');
                    }
                  })
                  .catch(err => {
                    if (err.name !== 'AbortError')
                     
                      console.error(err);
                  });
        }, 300);
      });

      commonNameResults.addEventListener('change', () => {
        const selectedOption = commonNameResults.options[commonNameResults.selectedIndex];
        if (selectedOption)
        {
          commonNameInput.value = selectedOption.text;
          selectedPersonUid = selectedOption.value;
          commonNameResults.classList.add('d-none');
          performAuditSearch(selectedPersonUid);
        }
      });

      btnClearCommonName.addEventListener('click', () => {
        commonNameInput.value = '';
        commonNameResults.innerHTML = '';
        commonNameResults.classList.add('d-none');
        selectedPersonUid = null;
        auditResultsBody.innerHTML = `
          <tr>
            <td colspan="3" class="text-center py-4 text-muted">
              <i class="fa-solid fa-search me-2"></i> Bitte suchen Sie nach einer Person.
            </td>
          </tr>`;
      });

      function performAuditSearch(uid)
      {
        auditResultsBody.innerHTML = `
          <tr>
            <td colspan="3" class="text-center py-4">
              <div class="spinner-border spinner-border-sm text-danger me-2"></div> Audit-Daten werden geladen...
            </td>
          </tr>`;

        fetchAuditData(uid)
                .then(updateAuditTable)
                .catch(err => {
                  auditResultsBody.innerHTML = `
              <tr>
                <td colspan="3" class="text-center py-4 text-danger">
                  <i class="fa-solid fa-circle-exclamation me-2"></i> Fehler: ${err.message}
                </td>
              </tr>`;
                });
      }

      btnSendCommonName.addEventListener('click', () => {
        if (selectedPersonUid)
        {
          performAuditSearch(selectedPersonUid);
        }
        else
        {
          const input = commonNameInput.value.trim();
          if (input.length < 3)
          {
            alert("Bitte geben Sie mindestens 3 Zeichen für die Suche ein.");
            return;
          }
          alert("Bitte wählen Sie zuerst eine Person aus der Liste aus.");
        }
      });
    </script>
  </body>
</html>
